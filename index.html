<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JRK Sculpture Visualizer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #ffffff; font-family: sans-serif; overflow: hidden; }
        model-viewer { 
            width: 100vw; height: 100vh; display: block; 
            background: radial-gradient(circle, #ffffff 0%, #f0f0f0 100%);
        }
        .ui-panel {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 30px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15); width: 320px; text-align: center; 
            z-index: 1000; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3);
        }
        .slider { width: 100%; accent-color: #FF6B00; margin: 15px 0; cursor: pointer; }
        .label { color: #FF6B00; font-weight: 800; font-size: 20px; margin-bottom: 5px; }
        
        .button-group { display: flex; gap: 10px; margin-top: 10px; justify-content: center; }
        .mode-btn {
            background: #eee; border: none; padding: 8px 15px; border-radius: 15px;
            font-size: 11px; font-weight: 700; cursor: pointer; color: #666; transition: 0.3s;
        }
        .mode-btn.active { background: #FF6B00; color: white; }
    </style>
</head>
<body>

    <model-viewer id="viewer" src="assembly.glb" ar ar-modes="webxr scene-viewer quick-look" 
                  camera-controls camera-orbit="auto auto 150%" max-camera-orbit="auto auto 400%"
                  environment-image="legacy" exposure="1.2" shadow-intensity="2" shadow-softness="0.5">
        <div class="ui-panel">
            <div id="controls-assembly">
                <div class="label">STEP: <span id="stepDisplay">0</span> / <span id="totalSteps">0</span></div>
                <input type="range" min="1" max="1" value="1" class="slider" id="assemblySlider">
            </div>
            <div id="controls-finished" style="display:none;">
                <div class="label">FINISHED SCULPTURE</div>
                <p style="font-size:11px; color:#888; margin: 5px 0 10px 0;">Displaying all components in full color.</p>
            </div>
            
            <div class="button-group">
                <button id="btn-asm" class="mode-btn active">ASSEMBLY MODE</button>
                <button id="btn-full" class="mode-btn">FINISHED MODE</button>
            </div>
        </div>
    </model-viewer>

    <script>
        const viewer = document.getElementById('viewer');
        const slider = document.getElementById('assemblySlider');
        const stepDisplay = document.getElementById('stepDisplay');
        const totalDisplay = document.getElementById('totalSteps');
        const btnAsm = document.getElementById('btn-asm');
        const btnFull = document.getElementById('btn-full');
        
        let cachedNodes = [];
        let viewMode = 'assembly'; 

        function initNodes() {
            if (!viewer.model) return;
            const symbols = Object.getOwnPropertySymbols(viewer.model);
            const hSym = symbols.find(s => s.toString().includes('hierarchy'));
            const allNodes = viewer.model[hSym] || viewer.model.nodes || [];

            cachedNodes = allNodes.filter(n => {
                const name = (n.name || "").toLowerCase();
                return name.startsWith("part");
            }).map(n => {
                const name = n.name.toLowerCase();
                return {
                    node: n,
                    num: parseInt((name.match(/\d+/) || [0])[0]),
                    isFinishedModePart: name.includes("_c") 
                };
            });

            if (cachedNodes.length > 0) {
                const asmParts = cachedNodes.filter(p => !p.isFinishedModePart);
                const maxStep = Math.max(...cachedNodes.map(p => p.num));
                
                slider.max = maxStep;
                slider.value = maxStep;
                totalDisplay.innerText = maxStep;
                updateView();
            }
        }

        function toggleDeep(node, isVisible) {
            node.visible = isVisible;
            if (node.mesh) node.mesh.visible = isVisible;
            if (node.children) node.children.forEach(c => toggleDeep(c, isVisible));
            if (node.scale) node.scale.set(isVisible ? 1 : 0, isVisible ? 1 : 0, isVisible ? 1 : 0);
        }

        function updateView() {
            const currentStep = parseInt(slider.value);
            stepDisplay.innerText = currentStep;

            cachedNodes.forEach(item => {
                if (viewMode === 'assembly') {
                    // FIX: Assembly mode now shows BOTH grey and color parts if they match the step
                    const shouldShow = (item.num === currentStep);
                    toggleDeep(item.node, shouldShow);
                } else {
                    // FINISHED MODE: Show only the pieces with the _C suffix
                    toggleDeep(item.node, item.isFinishedModePart);
                }
            });

            document.getElementById('controls-assembly').style.display = (viewMode === 'assembly') ? 'block' : 'none';
            document.getElementById('controls-finished').style.display = (viewMode === 'assembly') ? 'none' : 'block';

            if (typeof viewer.queueRender === 'function') viewer.queueRender();
        }

        btnAsm.onclick = () => { viewMode = 'assembly'; btnAsm.classList.add('active'); btnFull.classList.remove('active'); updateView(); };
        btnFull.onclick = () => { viewMode = 'full'; btnFull.classList.add('active'); btnAsm.classList.remove('active'); updateView(); };
        slider.oninput = () => updateView();

        viewer.addEventListener('load', () => {
            setTimeout(() => {
                viewer.model.materials.forEach(m => m.pbrMetallicRoughness.setRoughnessFactor(0.4));
                initNodes();
            }, 500);
        });
    </script>
</body>
</html>
